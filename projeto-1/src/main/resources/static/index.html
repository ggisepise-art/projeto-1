<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Controle Financeiro Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background-color: #f4f6f9; display: flex; min-height: 100vh; }
    .sidebar { width: 250px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; display: flex; flex-direction: column; padding: 20px; }
    .main-content { flex: 1; padding: 40px; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .btn-nova-transacao { background-color: #5a67d8; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; }
    .summary-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
    .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
    .table-container, .chart-container { background: white; padding: 30px; border-radius: 15px; }
    table { width: 100%; border-collapse: collapse; }
    table th, table td { padding: 15px; border-bottom: 1px solid #f0f0f0; }
    .receita-text { color: #2ecc71; font-weight: bold; }
    .despesa-text { color: #e74c3c; font-weight: bold; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: white; padding: 30px; border-radius: 15px; width: 400px; }
    .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
    .btn-salvar { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div style="font-size: 22px; font-weight: bold; margin-bottom: 40px;"><i class="fa-solid fa-wallet"></i> Controle</div>
    <ul style="list-style: none;">
      <li><a href="#" style="color: white; text-decoration: none;"><i class="fa-solid fa-home"></i> Resumo</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <div class="header">
      <h2>Olá, bem-vindo!</h2>
      <button class="btn-nova-transacao" onclick="abrirModal()">+ Nova Transação</button>
    </div>

    <div class="summary-cards">
      <div class="card" style="border-left: 5px solid #2ecc71;">Receitas <div id="res-rec" class="receita-text">R$ 0,00</div></div>
      <div class="card" style="border-left: 5px solid #e74c3c;">Despesas <div id="res-des" class="despesa-text">R$ 0,00</div></div>
      <div class="card" style="border-left: 5px solid #3498db;">Saldo <div id="res-saldo">R$ 0,00</div></div>
      <div class="card" style="border-left: 5px solid #9b59b6;">Total <div id="res-qtd">0</div></div>
    </div>

    <div class="main-grid">
      <div class="table-container">
        <table>
          <thead><tr><th>Descrição</th><th>Tipo</th><th>Valor</th><th>Data</th></tr></thead>
          <tbody id="lista"></tbody>
        </table>
      </div>
      <div class="chart-container">
        <canvas id="graficoDonut"></canvas>
      </div>
    </div>
  </main>

  <div id="modalAdd" class="modal">
    <div class="modal-content">
      <h3>Nova Transação</h3>
      <input type="text" id="desc" placeholder="Descrição">
      <input type="number" id="valor" placeholder="Valor R$">
      <select id="tipo">
        <option value="INCOME">Receita</option>
        <option value="EXPENSE">Despesa</option>
      </select>
      <button class="btn-salvar" onclick="salvar()">Salvar</button>
      <button onclick="fecharModal()" style="margin-top:10px; background:none; border:none; cursor:pointer; width:100%;">Cancelar</button>
    </div>
  </div>

  <script>
    const apiUrl = "http://localhost:8080/transactions";
    let chartInstance = null;

    function abrirModal() { document.getElementById("modalAdd").style.display = "flex"; }
    function fecharModal() { document.getElementById("modalAdd").style.display = "none"; }

    async function carregar() {
      const res = await fetch(apiUrl);
      const data = await res.json();
      let rec = 0, des = 0;
      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      data.forEach(t => {
        const isInc = t.type === "INCOME";
        isInc ? rec += t.amount : des += t.amount;
        lista.innerHTML += `<tr><td>${t.description}</td><td>${isInc?'REC':'DES'}</td><td class="${isInc?'receita-text':'despesa-text'}">R$ ${t.amount.toFixed(2)}</td><td>${t.date}</td></tr>`;
      });

      document.getElementById("res-rec").innerText = `R$ ${rec.toFixed(2)}`;
      document.getElementById("res-des").innerText = `R$ ${des.toFixed(2)}`;
      document.getElementById("res-saldo").innerText = `R$ ${(rec-des).toFixed(2)}`;
      document.getElementById("res-qtd").innerText = data.length;

      atualizarGrafico(rec, des);
    }

    async function salvar() {
      const desc = document.getElementById("desc").value;
      const valor = document.getElementById("valor").value;
      const tipo = document.getElementById("tipo").value;
      
      const dataFormatada = new Date().toISOString().split('T')[0];

      await fetch(apiUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          description: desc,
          amount: parseFloat(valor),
          type: tipo,
          date: dataFormatada 
        })
      });

      fecharModal();
      carregar();
    }

    function atualizarGrafico(rec, des) {
      const ctx = document.getElementById('graficoDonut').getContext('2d');
      if(chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Receitas', 'Despesas'],
          datasets: [{ data: [rec, des], backgroundColor: ['#2ecc71', '#e74c3c'] }]
        }
      });
    }

    carregar();
  </script>
</body>
</html>
