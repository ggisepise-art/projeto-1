<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Controle Financeiro Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    /* Estilos Globais */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background-color: #f4f6f9; display: flex; min-height: 100vh; }

    /* Barra Lateral */
    .sidebar { width: 250px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; display: flex; flex-direction: column; padding: 20px; transition: 0.3s; }
    .sidebar .logo { font-size: 22px; font-weight: bold; margin-bottom: 40px; text-align: center; }
    .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .sidebar-menu li a { text-decoration: none; color: white; display: flex; align-items: center; padding: 10px 15px; border-radius: 8px; }
    .sidebar-menu li a.active { background-color: rgba(255,255,255,0.2); font-weight: bold; }

    /* Conteúdo Principal */
    .main-content { flex: 1; padding: 40px; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .btn-nova-transacao { background-color: #5a67d8; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }

    /* Cartões de Resumo */
    .summary-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
    .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; border-left: 5px solid #ddd; }
    .card-title { font-size: 14px; color: #888; }
    .card-value { font-size: 24px; font-weight: bold; margin: 10px 0; }
    .card-icon { position: absolute; top: 20px; right: 20px; font-size: 24px; opacity: 0.2; }
    .receitas { border-color: #2ecc71; color: #2ecc71; }
    .despesas { border-color: #e74c3c; color: #e74c3c; }
    .saldo { border-color: #3498db; color: #3498db; }

    /* Grid Principal */
    .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
    .table-container, .chart-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    
    table { width: 100%; border-collapse: collapse; }
    table th { color: #aaa; padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
    table td { padding: 15px 10px; border-bottom: 1px solid #f9f9f9; }
    .receita-text { color: #2ecc71; font-weight: bold; }
    .despesa-text { color: #e74c3c; font-weight: bold; }

    /* MODAL */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: white; padding: 30px; border-radius: 15px; width: 400px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
    .modal-content h3 { margin-bottom: 20px; }
    .modal-content input, .modal-content select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; }
    .btn-salvar { background: #2ecc71; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="logo"><i class="fa-solid fa-wallet"></i> Controle</div>
    <ul class="sidebar-menu">
      <li><a href="#" class="active"><i class="fa-solid fa-home"></i> Resumo</a></li>
      <li><a href="#"><i class="fa-solid fa-chart-line"></i> Relatórios</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <div class="header">
      <div>
        <h2>Resumo Financeiro</h2>
        <p>Acompanhe suas entradas e saídas</p>
      </div>
      <button class="btn-nova-transacao" onclick="abrirModal()">
        <i class="fa-solid fa-plus"></i> Nova Transação
      </button>
    </div>

    <div class="summary-cards">
      <div class="card receitas">
        <div class="card-title">Receitas</div>
        <div class="card-value" id="resumo-receitas">R$ 0,00</div>
        <i class="fa-solid fa-arrow-up card-icon"></i>
      </div>
      <div class="card despesas">
        <div class="card-title">Despesas</div>
        <div class="card-value" id="resumo-despesas">R$ 0,00</div>
        <i class="fa-solid fa-arrow-down card-icon"></i>
      </div>
      <div class="card saldo">
        <div class="card-title">Saldo</div>
        <div class="card-value" id="resumo-saldo">R$ 0,00</div>
        <i class="fa-solid fa-scale-balanced card-icon"></i>
      </div>
      <div class="card">
        <div class="card-title">Transações</div>
        <div class="card-value" id="resumo-transacoes">0</div>
        <i class="fa-solid fa-list card-icon"></i>
      </div>
    </div>

    <div class="main-grid">
      <div class="table-container">
        <h3>Últimas Transações</h3>
        <table>
          <thead>
            <tr><th>Descrição</th><th>Tipo</th><th>Valor</th><th>Data</th><th>Ações</th></tr>
          </thead>
          <tbody id="lista"></tbody>
        </table>
      </div>

      <div class="chart-container">
        <h3>Proporção Mensal</h3>
        <canvas id="meuGrafico"></canvas>
      </div>
    </div>
  </main>

  <div id="modalTransacao" class="modal">
    <div class="modal-content">
      <h3>Nova Transação</h3>
      <input type="text" id="desc" placeholder="Descrição (ex: Salário)">
      <input type="number" id="valor" placeholder="Valor R$">
      <select id="tipo">
        <option value="INCOME">Receita</option>
        <option value="EXPENSE">Despesa</option>
      </select>
      <button class="btn-salvar" onclick="salvar()">Salvar Transação</button>
      <button onclick="fecharModal()" style="background:none; border:none; color:gray; width:100%; margin-top:10px; cursor:pointer;">Cancelar</button>
    </div>
  </div>

  <script>
    const apiUrl = "http://localhost:8080/transactions";
    let chartInstance = null;

    // Função para abrir/fechar modal
    function abrirModal() { document.getElementById("modalTransacao").style.display = "flex"; }
    function fecharModal() { document.getElementById("modalTransacao").style.display = "none"; }

    // Carregar dados e atualizar gráfico
    async function carregar() {
      try {
        const res = await fetch(apiUrl);
        const data = await res.json();

        let rec = 0, des = 0;
        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        data.forEach(t => {
          const isInc = t.type === "INCOME";
          isInc ? rec += t.amount : des += t.amount;

          lista.innerHTML += `
            <tr>
              <td>${t.description}</td>
              <td><span style="font-size:10px; padding:3px 8px; border-radius:10px; background:#eee;">${isInc ? 'RECEITA' : 'DESPESA'}</span></td>
              <td class="${isInc ? 'receita-text' : 'despesa-text'}">R$ ${t.amount.toFixed(2)}</td>
              <td style="color:#888">${t.date}</td>
              <td>
                <button class="btn-delete" onclick="excluir(${t.id})">
                  <i class="material-icons md-18">delete</i>
                </button>
              </td>
            </tr>
          `;
        });

        // Atualiza Cards
        document.getElementById("resumo-receitas").innerText = `R$ ${rec.toFixed(2)}`;
        document.getElementById("resumo-despesas").innerText = `R$ ${des.toFixed(2)}`;
        document.getElementById("resumo-saldo").innerText = `R$ ${(rec - des).toFixed(2)}`;
        document.getElementById("resumo-transacoes").innerText = data.length;

        atualizarGrafico(rec, des);
      } catch (e) { console.error("Erro:", e); }
    }

    // Função Salvar
    async function salvar() {
      const desc = document.getElementById("desc").value;
      const valor = document.getElementById("valor").value;
      const tipo = document.getElementById("tipo").value;

      if(!desc || !valor) return alert("Preencha tudo!");

      await fetch(apiUrl, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          description: desc,
          amount: parseFloat(valor),
          type: tipo,
          date: new Date().toISOString().split('T')[0]
        })
      });

      fecharModal();
      carregar();
      document.getElementById("desc").value = "";
      document.getElementById("valor").value = "";
    }

    // Função Excluir
    async function excluir(id) {
      if(confirm("Deseja excluir?")) {
        await fetch(`${apiUrl}/${id}`, { method: "DELETE" });
        carregar();
      }
    }

    // Gráfico Chart.js
    function atualizarGrafico(rec, des) {
      const ctx = document.getElementById('meuGrafico').getContext('2d');
      if(chartInstance) chartInstance.destroy();
      
      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Receitas', 'Despesas'],
          datasets: [{
            data: [rec, des],
            backgroundColor: ['#2ecc71', '#e74c3c'],
            borderWidth: 0
          }]
        },
        options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
      });
    }

    carregar();
  </script>
</body>
</html>
